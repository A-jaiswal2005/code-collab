version: "3.9"

services:
  # ---------------------------------------------------------------
  # Backend: Express + Socket.io (Yjs signaling, WebRTC signaling,
  # Judge0 proxy)
  # ---------------------------------------------------------------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: code-collab-backend
    restart: unless-stopped
    ports:
      - "4000:4000"
    environment:
      - PORT=4000
      - NODE_ENV=production
      - CLIENT_ORIGIN=http://localhost:5173
      # Judge0 - defaults to the public RapidAPI-hosted CE instance.
      # Swap these for a self-hosted Judge0 instance if you have one.
      - JUDGE0_API_URL=${JUDGE0_API_URL:-https://judge0-ce.p.rapidapi.com}
      - JUDGE0_API_KEY=${JUDGE0_API_KEY:-}
      - JUDGE0_API_HOST=${JUDGE0_API_HOST:-judge0-ce.p.rapidapi.com}
    networks:
      - code-collab-net

  # ---------------------------------------------------------------
  # Frontend: React (Vite) served via nginx in production build
  # ---------------------------------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_BACKEND_URL=http://localhost:4000
        - VITE_YWEBSOCKET_URL=ws://localhost:4000/yjs
    container_name: code-collab-frontend
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      - backend
    networks:
      - code-collab-net

networks:
  code-collab-net:
    driver: bridge